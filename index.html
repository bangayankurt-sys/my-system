<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kurt // Systems</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
body{margin:0; padding:16px; background:#0B0D10; min-height:100vh; display:flex; align-items:flex-start; justify-content:center;}
.table-wrap{overflow-x:auto; -webkit-overflow-scrolling:touch; margin-top:10px;}
@media (max-width:700px){
  body{padding:0;}
  #app{border-radius:0; min-height:100vh; flex-direction:column;}
  #sidebar{width:100%; min-width:0; flex-direction:row; overflow-x:auto; padding:10px 8px; gap:4px; border-right:none; border-bottom:1px solid var(--line); align-items:center; -webkit-overflow-scrolling:touch;}
  #sidebar .brand{display:none;}
  .navbtn{white-space:nowrap; padding:8px 12px; flex-shrink:0;}
  #user-badge{margin-top:0 !important; flex-direction:row !important; align-items:center !important; border-top:none !important; padding:8px 12px !important; white-space:nowrap; flex-shrink:0;}
  #telemetry{overflow-x:auto;}
  #content{padding:16px 12px;}
  .row{flex-direction:column;}
  .row .col{min-width:0;}
  .table-wrap table{min-width:620px;}
  .card{padding:14px;}
  .calgrid{gap:2px;}
  .calgrid-labels{font-size:8.5px;}
  .calnum{font-size:9px;}
  .caldot{width:5px; height:5px;}
  .cal-legend{gap:8px; font-size:10px;}
  .cal-legend span{display:inline-flex; align-items:center;}
  .modal-box{padding:16px; max-width:100%;}
  h1.pagetitle{font-size:17px;}
  .card h3{font-size:12px;}
}
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#0A0A0A;
  --surface:#141414;
  --surface2:#1D1D1D;
  --line:#333333;
  --text:#F2F2F2;
  --muted:#8C8C8C;
  --amber:#E63946;
  --cyan:#F2F2F2;
  --violet:#FF6B6B;
  --danger:#FF3B30;
}
*{box-sizing:border-box;}
#app{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  min-height:640px;
  border-radius:10px;
  overflow:hidden;
  border:1px solid var(--line);
}
.mono{font-family:'JetBrains Mono',monospace;}
.display{font-family:'Space Grotesk',sans-serif;}

/* Sidebar */
#sidebar{
  width:180px;
  min-width:180px;
  background:var(--surface);
  border-right:1px solid var(--line);
  padding:18px 10px;
  display:flex;
  flex-direction:column;
  gap:2px;
}
#sidebar .brand{
  font-family:'Space Grotesk',sans-serif;
  font-weight:700;
  font-size:13px;
  letter-spacing:0.08em;
  color:var(--muted);
  padding:0 10px 16px 10px;
  text-transform:uppercase;
}
.navbtn{
  display:flex;
  align-items:center;
  gap:9px;
  padding:9px 10px;
  border-radius:6px;
  cursor:pointer;
  color:var(--muted);
  font-size:13px;
  font-weight:500;
  border:1px solid transparent;
  transition:background .15s, color .15s;
  user-select:none;
}
.navbtn:hover{background:var(--surface2); color:var(--text);}
.navbtn.active{background:var(--surface2); color:var(--text); border-color:var(--line);}
.navbtn .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.5;flex-shrink:0;}
.navbtn.active .dot{opacity:1;}

/* Main */
#main{flex:1; display:flex; flex-direction:column; min-width:0;}
#telemetry{
  display:flex;
  gap:0;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg, var(--surface2), var(--surface));
  overflow-x:auto;
}
.tstat{
  padding:10px 18px;
  border-right:1px solid var(--line);
  white-space:nowrap;
}
.tstat .tlabel{font-size:9px; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase;}
.tstat .tval{font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:600; margin-top:2px;}

#content{flex:1; overflow-y:auto; padding:24px 28px;}
h1.pagetitle{font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:700; margin:0 0 4px 0;}
.pagesub{color:var(--muted); font-size:12.5px; margin:0 0 20px 0;}

.card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:8px;
  padding:16px 18px;
  margin-bottom:14px;
}
.card h3{font-family:'Space Grotesk',sans-serif; font-size:13px; margin:0 0 12px 0; color:var(--text); font-weight:600; text-transform:uppercase; letter-spacing:.04em;}

.row{display:flex; gap:10px; flex-wrap:wrap;}
.col{flex:1; min-width:140px;}

label{font-size:11px; color:var(--muted); display:block; margin-bottom:4px; text-transform:uppercase; letter-spacing:.03em;}
input, select, textarea{
  width:100%;
  background:var(--bg);
  border:1px solid var(--line);
  color:var(--text);
  padding:8px 10px;
  border-radius:5px;
  font-family:'Inter',sans-serif;
  font-size:13px;
  outline:none;
}
input:focus, select:focus, textarea:focus{border-color:var(--cyan);}
textarea{resize:vertical; min-height:70px;}

button{
  background:var(--cyan);
  color:#0C1013;
  border:none;
  padding:9px 16px;
  border-radius:5px;
  font-weight:600;
  font-size:13px;
  cursor:pointer;
  font-family:'Inter',sans-serif;
}
button:hover{filter:brightness(1.08);}
button.secondary{background:transparent; color:var(--muted); border:1px solid var(--line);}
button.secondary:hover{color:var(--text); border-color:var(--muted);}
button.danger{background:transparent; color:var(--danger); border:1px solid var(--danger);}

table{width:100%; border-collapse:collapse; font-size:12.5px;}
th{text-align:left; color:var(--muted); font-weight:500; padding:6px 8px; border-bottom:1px solid var(--line); text-transform:uppercase; font-size:10.5px; letter-spacing:.03em;}
td{padding:7px 8px; border-bottom:1px solid var(--line);}
tr:last-child td{border-bottom:none;}

.tag{
  display:inline-block;
  background:var(--surface2);
  border:1px solid var(--line);
  color:var(--muted);
  padding:2px 8px;
  border-radius:20px;
  font-size:10.5px;
  margin:2px 3px 2px 0;
}
.pr-badge{background:var(--amber); color:#1A1200; padding:2px 7px; border-radius:4px; font-size:10px; font-weight:700; margin-left:6px;}

.empty{color:var(--muted); font-size:12.5px; text-align:center; padding:24px 0;}

.jrnl-entry{border-bottom:1px solid var(--line); padding:12px 0;}
.jrnl-entry:last-child{border-bottom:none;}
.jrnl-date{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--cyan); margin-bottom:4px;}
.jrnl-text{font-size:13px; line-height:1.5; white-space:pre-wrap;}

.chip-row{display:flex; flex-wrap:wrap; gap:6px; margin-top:6px;}
.chip{
  padding:5px 10px; border-radius:20px; border:1px solid var(--line); font-size:12px; cursor:pointer; color:var(--muted);
}
.chip.on{background:var(--violet); color:#14071C; border-color:var(--violet); font-weight:600;}
.chip-x{margin-left:7px; opacity:.55; font-weight:700;}
.chip-x:hover{opacity:1; color:var(--danger);}

.moodbtns{display:flex; gap:6px;}
.moodbtn{width:38px; height:38px; border-radius:6px; border:1px solid var(--line); background:var(--bg); cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; color:var(--muted);}
.moodbtn.sel{border-color:var(--violet); background:var(--surface2); color:var(--text);}

.smallmuted{color:var(--muted); font-size:11px;}

.type-Brush{color:var(--cyan);} .type-Action{color:var(--amber);} .type-Texture{color:var(--violet);} .type-Plugin{color:#CFCFCF;} .type-Reference{color:#FF8A80;} .type-Tutorial{color:#8C8C8C;}

.svgchart{width:100%; height:80px;}

.calgrid-labels{display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:6px; font-size:10px; color:var(--muted); text-align:center; text-transform:uppercase;}
.calgrid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px;}
.calcell{aspect-ratio:1; border:1px solid var(--line); border-radius:6px; padding:4px; cursor:pointer; display:flex; flex-direction:column; justify-content:space-between; background:var(--bg);}
.calcell.empty{border:none; cursor:default; background:transparent;}
.calcell:hover{border-color:var(--muted);}
.calcell.selected{border-color:var(--amber); background:var(--surface2);}
.calcell.today .calnum{color:var(--amber); font-weight:700;}
.calnum{font-size:11px; color:var(--text);}
.caldots{display:flex; gap:2px; flex-wrap:wrap;}
.caldot{width:6px; height:6px; border-radius:50%; display:inline-block;}
.cal-legend{display:flex; gap:14px; flex-wrap:wrap; font-size:11px; color:var(--muted); margin-bottom:14px; align-items:center;}
.cal-legend .caldot{margin-right:4px;}

.modal-overlay{position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:998; padding:16px;}
.modal-box{background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:20px; width:100%; max-width:440px; max-height:85vh; overflow-y:auto;}

::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-thumb{background:var(--line); border-radius:4px;}
</style>
</head>
<body>

<div id="app">
  <div id="sidebar">
    <div class="brand">Kurt // Systems</div>
    <div class="navbtn active" data-view="dashboard"><span class="dot"></span>Dashboard</div>
    <div class="navbtn" data-view="gym"><span class="dot"></span>Gym Progress</div>
    <div class="navbtn" data-view="assets"><span class="dot"></span>PS Assets</div>
    <div class="navbtn" data-view="habits"><span class="dot"></span>Habits/Mood/Sleep</div>
    <div class="navbtn" data-view="journal"><span class="dot"></span>Journal</div>
    <div class="navbtn" data-view="calendar"><span class="dot"></span>Calendar</div>
  </div>
  <div id="main">
    <div id="telemetry"></div>
    <div id="content"></div>
  </div>
</div>

<script>
(function(){

// ============================================================
// FIREBASE CONFIG &mdash; paste your project's config here.
// Get this from: Firebase Console > Project Settings > Your apps > Web app
// Until you paste real values, the app runs fully offline (local-only), same as before.
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyAbH-qW0ew-U5F6MqMssAU-m5Qh2ZxJqgw",
  authDomain: "ax-tracker.firebaseapp.com",
  projectId: "ax-tracker",
  storageBucket: "ax-tracker.firebasestorage.app",
  messagingSenderId: "500810258417",
  appId: "1:500810258417:web:64e3dfa33f99e5a10a1650"
};

let cloudEnabled = false;
let auth = null, db = null, currentUser = null, remoteDoc = null;

try{
  if(firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf('PASTE_') !== 0){
    firebase.initializeApp(firebaseConfig);
    auth = firebase.auth();
    db = firebase.firestore();
    cloudEnabled = true;
  }
}catch(e){ console.error('Firebase init failed', e); cloudEnabled = false; }

const FIELD_MAP = {
  'gym:entries':'gym',
  'assets:list':'assets',
  'habits:names':'habitNames',
  'habits:entries':'habitEntries',
  'journal:entries':'journal'
};

// ---------- storage helpers (local + optional cloud sync) ----------
function localKey(key){
  return (cloudEnabled && currentUser) ? `${currentUser.uid}:${key}` : key;
}
async function loadArr(key){
  try{
    if(cloudEnabled && remoteDoc){
      const field = FIELD_MAP[key];
      if(remoteDoc[field] !== undefined){
        localStorage.setItem(localKey(key), JSON.stringify(remoteDoc[field]));
        return remoteDoc[field];
      }
    }
    const raw = localStorage.getItem(localKey(key));
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}
async function saveArr(key, val){
  localStorage.setItem(localKey(key), JSON.stringify(val));
  try{
    if(cloudEnabled && currentUser){
      const field = FIELD_MAP[key];
      if(remoteDoc) remoteDoc[field] = val;
      await db.collection('users').doc(currentUser.uid).set({[field]: val}, {merge:true});
    }
  }catch(e){ console.error('cloud save failed', key, e); }
}
function uid(){ return Math.random().toString(36).slice(2,10); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){
  const dt = new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-US',{month:'short', day:'numeric', year:'numeric'});
}
function daysAgo(n){ const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); }

// ---------- state ----------
let state = {
  gym: [],       // {id,date,exercise,weight,reps,unit}
  assets: [],    // {id,name,type,tags:[],notes,link}
  habitNames: ['Trained','Slept 7h+','Tracked macros','No junk food'],
  habitEntries: [], // {id,date,checked:[...names], mood, sleep}
  journal: []    // {id,date,text}
};

async function loadAll(){
  const [g,a,hn,he,j] = await Promise.all([
    loadArr('gym:entries'),
    loadArr('assets:list'),
    loadArr('habits:names'),
    loadArr('habits:entries'),
    loadArr('journal:entries')
  ]);
  state.gym = g;
  state.assets = a;
  state.habitNames = (hn && hn.length) ? hn : state.habitNames;
  state.habitEntries = he;
  state.journal = j;
}

// ---------- e1RM ----------
function epley(weight, reps){ return weight * (1 + reps/30); }

// ---------- SVG mini line chart ----------
function lineChart(values, color, w=560, h=80){
  if(!values.length) return `<div class="empty">Not enough data yet</div>`;
  const max = Math.max(...values, 1);
  const min = Math.min(...values, 0);
  const range = (max-min) || 1;
  const pad = 8;
  const step = values.length>1 ? (w-pad*2)/(values.length-1) : 0;
  const pts = values.map((v,i)=>{
    const x = pad + i*step;
    const y = h - pad - ((v-min)/range)*(h-pad*2);
    return `${x},${y}`;
  }).join(' ');
  const dots = values.map((v,i)=>{
    const x = pad + i*step;
    const y = h - pad - ((v-min)/range)*(h-pad*2);
    return `<circle cx="${x}" cy="${y}" r="2.5" fill="${color}"/>`;
  }).join('');
  return `<svg class="svgchart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" vector-effect="non-scaling-stroke"/>
    ${dots}
  </svg>`;
}

// ---------- telemetry strip ----------
function computeStreak(){
  let streak = 0;
  const entriesByDate = {};
  state.habitEntries.forEach(e=> entriesByDate[e.date]=e);
  let cursor = new Date();
  while(true){
    const ds = cursor.toISOString().slice(0,10);
    if(entriesByDate[ds]){ streak++; cursor.setDate(cursor.getDate()-1); }
    else break;
  }
  return streak;
}

function avgField(entries, field, days, excludeToday){
  const cutoff = new Date(daysAgo(days));
  const today = todayStr();
  const relevant = entries.filter(e=> new Date(e.date) >= cutoff && (!excludeToday || e.date !== today));
  if(!relevant.length) return null;
  return relevant.reduce((s,e)=> s + (Number(e[field])||0), 0) / relevant.length;
}

function getTodayBrief(){
  const today = todayStr();
  const todayHabit = state.habitEntries.find(e=>e.date===today);
  const sleepToday = todayHabit ? Number(todayHabit.sleep)||0 : null;
  const moodToday = todayHabit ? todayHabit.mood : null;
  const avgSleep = avgField(state.habitEntries, 'sleep', 30, true);
  const avgMood = avgField(state.habitEntries, 'mood', 30, true);

  const sortedGym = [...state.gym].sort((a,b)=> new Date(b.date)-new Date(a.date));
  let lastWorkout = null;
  if(sortedGym.length){
    const lastDate = sortedGym[0].date;
    const sameDayEntries = state.gym.filter(g=>g.date===lastDate);
    const label = sameDayEntries.find(g=>g.session)?.session || sameDayEntries[0].exercise;
    const days = Math.round((new Date(today) - new Date(lastDate)) / 86400000);
    lastWorkout = { label, daysAgo: days };
  }

  return {
    sleepToday, avgSleep,
    sleepDelta: (sleepToday!==null && avgSleep!==null) ? sleepToday-avgSleep : null,
    moodToday, avgMood,
    moodDelta: (moodToday && avgMood!==null) ? moodToday-avgMood : null,
    lastWorkout,
    streak: computeStreak(),
    journalToday: state.journal.some(j=>j.date===today)
  };
}

function getWeeklySummary(){
  const cutoff = new Date(daysAgo(7));
  const gymDates = new Set(state.gym.filter(g=> new Date(g.date) >= cutoff).map(g=>g.date));
  const habits7 = state.habitEntries.filter(e=> new Date(e.date) >= cutoff);
  const journal7 = state.journal.filter(j=> new Date(j.date) >= cutoff);
  const avgSleep7 = avgField(state.habitEntries, 'sleep', 7, false);
  const avgMood7 = avgField(state.habitEntries, 'mood', 7, false);
  const habitCompletion = habits7.length && state.habitNames.length
    ? (habits7.reduce((s,e)=> s + (e.checked.length/state.habitNames.length), 0) / habits7.length) * 100
    : null;
  return {
    workoutDays: gymDates.size,
    avgSleep7, avgMood7,
    journalCount: journal7.length,
    habitCompletion
  };
}

function renderTelemetry(){
  const el = document.getElementById('telemetry');
  const streak = computeStreak();
  // last PR
  let lastPR = '&mdash;';
  if(state.gym.length){
    const byExercise = {};
    state.gym.forEach(g=>{
      const unit = g.unit || 'kg';
      if(unit === 'stack') return;
      const total = computeTotalWeight({...g, unit});
      const e1 = epley(total, g.reps);
      if(!byExercise[g.exercise] || e1 > byExercise[g.exercise].e1) byExercise[g.exercise] = {e1, date:g.date};
    });
    const sorted = Object.entries(byExercise).sort((a,b)=> new Date(b[1].date)-new Date(a[1].date));
    if(sorted.length) lastPR = `${sorted[0][0]} ${sorted[0][1].e1.toFixed(1)}kg`;
  }
  // avg sleep last 7d
  const last7 = state.habitEntries.filter(e=> new Date(e.date) >= new Date(daysAgo(7)));
  const avgSleep = last7.length ? (last7.reduce((s,e)=> s+(Number(e.sleep)||0),0)/last7.length).toFixed(1) : '&mdash;';
  // journal count
  const jCount = state.journal.length;

  el.innerHTML = `
    <div class="tstat"><div class="tlabel">Streak</div><div class="tval" style="color:var(--amber)">${streak}d</div></div>
    <div class="tstat"><div class="tlabel">Best e1RM</div><div class="tval" style="color:var(--cyan)">${lastPR}</div></div>
    <div class="tstat"><div class="tlabel">Avg Sleep 7D</div><div class="tval" style="color:var(--violet)">${avgSleep}h</div></div>
    <div class="tstat"><div class="tlabel">Journal Entries</div><div class="tval">${jCount}</div></div>
    <div class="tstat"><div class="tlabel">PS Assets</div><div class="tval">${state.assets.length}</div></div>
  `;
}

// ---------- DASHBOARD ----------
function moodEmoji(m){ return ['','&#128542;','&#128533;','&#128528;','&#128578;','&#128516;'][m] || '&mdash;'; }
function deltaText(delta, unit){
  if(delta===null || delta===undefined || isNaN(delta)) return '';
  const rounded = Math.abs(delta) < 0.05 ? 0 : delta;
  if(rounded === 0) return ' (same as average)';
  const arrow = rounded > 0 ? '&uarr;' : '&darr;';
  const color = rounded > 0 ? 'var(--text)' : 'var(--danger)';
  return ` <span style="color:${color}">${arrow} ${Math.abs(rounded).toFixed(1)}${unit} from average</span>`;
}

function viewDashboard(){
  const recentGym = [...state.gym].sort((a,b)=> new Date(b.date)-new Date(a.date)).slice(0,3);
  const recentJournal = [...state.journal].sort((a,b)=> new Date(b.date)-new Date(a.date)).slice(0,1)[0];
  const today = todayStr();
  const todayHabit = state.habitEntries.find(e=>e.date===today);
  const brief = getTodayBrief();
  const weekly = getWeeklySummary();

  return `
    <h1 class="pagetitle">Dashboard</h1>
    <p class="pagesub">${fmtDate(today)} &mdash; quick snapshot</p>

    <div class="card">
      <h3>Today's Brief</h3>
      <div style="font-size:13px; line-height:2;">
        <div>Sleep: ${brief.sleepToday!==null ? brief.sleepToday+'h' : 'not logged'}${brief.sleepToday!==null ? deltaText(brief.sleepDelta, 'h') : ''}</div>
        <div>Mood: ${brief.moodToday ? moodEmoji(brief.moodToday) : 'not logged'}${brief.moodToday ? deltaText(brief.moodDelta, '') : ''}</div>
        <div>Last workout: ${brief.lastWorkout ? `${brief.lastWorkout.label} (${brief.lastWorkout.daysAgo===0?'today':brief.lastWorkout.daysAgo+'d ago'})` : 'none logged'}</div>
        <div>Current streak: <span style="color:var(--amber)">${brief.streak} day${brief.streak===1?'':'s'}</span></div>
        <div>Journal written: ${brief.journalToday ? 'Yes' : 'No'}</div>
      </div>
    </div>

    <div class="row">
      <div class="col card">
        <h3>Recent lifts</h3>
        ${recentGym.length ? recentGym.map(g=>`
          <div style="display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-bottom:1px solid var(--line)">
            <span>${g.exercise}</span>
            <span class="mono">${displayWeight({...g, unit:g.unit||'kg', total:computeTotalWeight({...g, unit:g.unit||'kg'})})} &times; ${g.reps}</span>
          </div>`).join('') : `<div class="empty">No lifts logged yet</div>`}
      </div>
      <div class="col card">
        <h3>Today's check-in</h3>
        ${todayHabit ? `

// ---------- GYM ----------
function computeTotalWeight(entry){
  if(entry.unit === 'stack') return null;
  if(entry.unit === 'kg_per_side') return (Number(entry.weightPerSide)||0)*2 + (Number(entry.barWeight)||0);
  return Number(entry.weight)||0;
}

function bestE1RMPerExercise(){
  const map = {};
  state.gym.forEach(g=>{
    const unit = g.unit || 'kg';
    const total = computeTotalWeight({...g, unit});
    const e1 = (unit !== 'stack' && g.reps) ? epley(total, g.reps) : null;
    const stackScore = (unit === 'stack' && g.reps) ? epley(Number(g.weight), g.reps) : null;
    if(!map[g.exercise]) map[g.exercise]=[];
    map[g.exercise].push({...g, unit, total, e1, stackScore});
  });
  return map;
}

function displayWeight(s){
  if(s.unit === 'stack') return `Stack ${s.weight}`;
  if(s.unit === 'kg_per_side') return `${s.weightPerSide}kg/side + ${s.barWeight}kg bar = ${s.total}kg`;
  return `${s.weight}kg`;
}

function gymRowHtml(s, isKgSection){
  const isEditing = editingGymId === s.id;
  if(isEditing){
    let weightFieldHtml;
    if(s.unit === 'kg_per_side'){
      weightFieldHtml = `<input type="number" step="0.5" id="edit-weight-perside-${s.id}" value="${s.weightPerSide}" style="width:64px;"/> /side + <input type="number" step="0.5" id="edit-barweight-${s.id}" value="${s.barWeight}" style="width:56px;"/> bar`;
    }else{
      weightFieldHtml = `<input type="number" step="0.5" id="edit-weight-${s.id}" value="${s.weight}" style="width:70px;"/>`;
    }
    return `<tr>
      <td><input type="date" id="edit-date-${s.id}" value="${s.date}" style="width:135px;"/></td>
      <td>${weightFieldHtml}</td>
      <td><input type="number" id="edit-reps-${s.id}" value="${s.reps}" style="width:52px;"/></td>
      ${isKgSection ? `<td class="mono">${s.e1.toFixed(1)}kg</td>` : `<td class="mono">${s.stackScore.toFixed(1)}</td>`}
      <td class="smallmuted">${s.muscleGroup||'&mdash;'}</td>
      <td class="smallmuted">${s.session||'&mdash;'}</td>
      <td style="display:flex; gap:6px;">

        <button class="secondary" data-cancel-gym="${s.id}" style="padding:3px 9px; font-size:10.5px;">Cancel</button>

    ${isKgSection ? `<td class="mono">${s.e1.toFixed(1)}kg</td>` : `<td class="mono">${s.stackScore.toFixed(1)}</td>`}
    <td class="smallmuted">${s.muscleGroup||'&mdash;'}</td>
    <td class="smallmuted">${s.session||'&mdash;'}</td>
    <td style="display:flex; gap:6px;">
      <button class="secondary" data-edit-gym="${s.id}" style="padding:3px 9px; font-size:10.5px;">Edit</button>
      <button class="danger" data-del-gym="${s.id}" style="padding:3px 9px; font-size:10.5px;">Delete</button>
    </td>
  </tr>`;
}

function viewCalendar(){
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const firstDay = new Date(calYear, calMonth, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

  const gymByDate = {}; state.gym.forEach(g=>{ (gymByDate[g.date] = gymByDate[g.date]||[]).push(g); });
  const journalByDate = {}; state.journal.forEach(j=>{ (journalByDate[j.date] = journalByDate[j.date]||[]).push(j); });
  const habitByDate = {}; state.habitEntries.forEach(e=>{ habitByDate[e.date]=e; });

  let cells = '';
  for(let i=0;i<startWeekday;i++) cells += `<div class="calcell empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const key = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasWorkout = !!gymByDate[key];
    const hasJournal = !!journalByDate[key];
    const habit = habitByDate[key];
    const goodSleep = habit && Number(habit.sleep) >= 7;
    const perfectHabits = habit && state.habitNames.length>0 && habit.checked.length === state.habitNames.length;
    const isSelected = selectedCalDate === key;
    const isToday = key === todayStr();
    let dots = '';
    if(hasWorkout) dots += `<span class="caldot" style="background:#4CAF50"></span>`;
    if(hasJournal) dots += `<span class="caldot" style="background:#4A90D9"></span>`;
    if(goodSleep) dots += `<span class="caldot" style="background:#9C6ADE"></span>`;
    if(perfectHabits) dots += `<span class="caldot" style="background:#E8C547"></span>`;
    cells += `<div class="calcell ${isSelected?'selected':''} ${isToday?'today':''}" data-cal-date="${key}">
      <div class="calnum">${d}</div>
      <div class="caldots">${dots}</div>
    </div>`;
  }

  let detail = `<div class="empty">Click a day. See everything you did.</div>`;
  if(selectedCalDate){
    const g = gymByDate[selectedCalDate] || [];
    const j = journalByDate[selectedCalDate] || [];
    const h = habitByDate[selectedCalDate];
    detail = `
      <div class="mono" style="color:var(--cyan); font-size:13px; margin-bottom:10px;">${fmtDate(selectedCalDate)}</div>
      ${g.length ? `<div style="margin-bottom:10px;"><strong style="font-size:12.5px;">Workout</strong>${g.map(s=>{
        const unit = s.unit||'kg';
        return `<div class="smallmuted" style="margin-top:3px;">${s.exercise}: ${displayWeight({...s, unit, total:computeTotalWeight({...s, unit})})} &times; ${s.reps}${s.session?` (${s.session})`:''}</div>`;
      }).join('')}</div>` : ''}
      ${h ? `<div style="margin-bottom:10px;"><strong style="font-size:12.5px;">Mood/Sleep</strong><div class="smallmuted" style="margin-top:3px;">Mood: ${moodEmoji(h.mood)} &nbsp; Sleep: ${h.sleep||'&mdash;'}h</div><div class="chip-row">${h.checked.map(c=>`<span class="tag">${c}</span>`).join('') || '<span class="smallmuted">No habits checked</span>'}</div></div>` : ''}
      ${j.length ? `<div><strong style="font-size:12.5px;">Journal</strong>${j.map(e=>`<div class="jrnl-text" style="margin-top:4px;">${e.text}</div>`).join('')}</div>` : ''}
      ${(!g.length && !h && !j.length) ? `<div class="empty">Nothing logged this day</div>` : ''}
    `;
  }

  return `
    <h1 class="pagetitle">Calendar</h1>
    <p class="pagesub">See your patterns at a glance</p>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
        <button class="secondary" id="cal-prev">&lsaquo; Prev</button>
        <h3 style="margin:0; text-transform:none;">${monthNames[calMonth]} ${calYear}</h3>
        <button class="secondary" id="cal-next">Next &rsaquo;</button>
      </div>
      <div class="cal-legend">
        <span><span class="caldot" style="background:#4CAF50"></span> Workout</span>
        <span><span class="caldot" style="background:#4A90D9"></span> Journal</span>
        <span><span class="caldot" style="background:#9C6ADE"></span> Good sleep</span>
        <span><span class="caldot" style="background:#E8C547"></span> Perfect habits</span>
      </div>
      <div class="calgrid-labels">
        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
      </div>
      <div class="calgrid">${cells}</div>
    </div>

    <div class="card">
      <h3>Day detail</h3>
      ${detail}
    </div>
  `;
}

// ---------- ROUTING ----------
let currentView = 'dashboard';
let gymSearch = '';
let editingGymId = null;
let muscleFilter = 'all';
let quickAddExercise = null;
let assetFilter = 'all';
let assetSearch = '';
let calMonth = new Date().getMonth();
let habitFormDate = null;
let calYear = new Date().getFullYear();
let selectedCalDate = null;

function render(){
  renderTelemetry();
  const content = document.getElementById('content');
  if(currentView==='dashboard') content.innerHTML = viewDashboard();
  else if(currentView==='gym') content.innerHTML = viewGym(gymSearch, muscleFilter);
  else if(currentView==='assets') content.innerHTML = viewAssets(assetFilter, assetSearch);
  else if(currentView==='habits') content.innerHTML = viewHabits();
  else if(currentView==='journal') content.innerHTML = viewJournal();
  else if(currentView==='calendar') content.innerHTML = viewCalendar();
  attachHandlers();
  document.querySelectorAll('.navbtn').forEach(b=> b.classList.toggle('active', b.dataset.view===currentView));
}

function attachHandlers(){
  // GYM
  const gUnit = document.getElementById('g-unit');
  if(gUnit) gUnit.onchange = (e)=>{
    document.getElementById('g-fields-kg').style.display = e.target.value==='kg' ? 'flex' : 'none';
    document.getElementById('g-fields-perside').style.display = e.target.value==='kg_per_side' ? 'flex' : 'none';
    document.getElementById('g-fields-stack').style.display = e.target.value==='stack' ? 'flex' : 'none';
  };
  const gAdd = document.getElementById('g-add');
  if(gAdd) gAdd.onclick = async ()=>{
    const exercise = document.getElementById('g-exercise').value.trim();
    const unit = document.getElementById('g-unit').value;
    const reps = parseInt(document.getElementById('g-reps').value);
    const date = document.getElementById('g-date').value || todayStr();
    const session = document.getElementById('g-session').value.trim();
    const muscleGroup = document.getElementById('g-muscle').value;
    if(!exercise || !reps) return;

    let entry = {id:uid(), date, exercise, reps, unit, session, muscleGroup};
    if(unit==='kg'){
      const weight = parseFloat(document.getElementById('g-weight').value);
      if(!weight) return;
      entry.weight = weight;
    }else if(unit==='kg_per_side'){
      const weightPerSide = parseFloat(document.getElementById('g-weight-perside').value);
      const barWeight = parseFloat(document.getElementById('g-bar-weight').value) || 0;
      if(!weightPerSide) return;
      entry.weightPerSide = weightPerSide;
      entry.barWeight = barWeight;
    }else if(unit==='stack'){
      const stack = parseFloat(document.getElementById('g-stack').value);
      if(!stack) return;
      entry.weight = stack;
    }

    state.gym.push(entry);
    await saveArr('gym:entries', state.gym);
    render();
  };
  document.querySelectorAll('[data-del-gym]').forEach(b=>{
    b.onclick = async ()=>{
      state.gym = state.gym.filter(g=>g.id!==b.dataset.delGym);
      await saveArr('gym:entries', state.gym);
      render();
    };
  });
  document.querySelectorAll('[data-edit-gym]').forEach(b=>{
    b.onclick = ()=>{
      editingGymId = b.dataset.editGym;
      render();
    };
  });
  document.querySelectorAll('[data-cancel-gym]').forEach(b=>{
    b.onclick = ()=>{
      editingGymId = null;
      render();
    };
  });
  document.querySelectorAll('[data-save-gym]').forEach(b=>{
    b.onclick = async ()=>{
      const id = b.dataset.saveGym;
      const entry = state.gym.find(g=>g.id===id);
      if(!entry) return;
      const unit = entry.unit || 'kg';
      const dateEl = document.getElementById(`edit-date-${id}`);
      const repsEl = document.getElementById(`edit-reps-${id}`);
      if(dateEl && dateEl.value) entry.date = dateEl.value;
      if(repsEl && repsEl.value) entry.reps = parseInt(repsEl.value);
      if(unit === 'kg_per_side'){
        const wpsEl = document.getElementById(`edit-weight-perside-${id}`);
        const bwEl = document.getElementById(`edit-barweight-${id}`);
        if(wpsEl && wpsEl.value) entry.weightPerSide = parseFloat(wpsEl.value);
        if(bwEl && bwEl.value) entry.barWeight = parseFloat(bwEl.value);
      }else{
        const wEl = document.getElementById(`edit-weight-${id}`);
        if(wEl && wEl.value) entry.weight = parseFloat(wEl.value);
      }
      editingGymId = null;
      await saveArr('gym:entries', state.gym);
      render();
    };
  });

  // QUICK ADD MODAL
  function setQaFieldVisibility(unit){
    document.getElementById('qa-fields-kg').style.display = unit==='kg' ? 'flex' : 'none';
    document.getElementById('qa-fields-perside').style.display = unit==='kg_per_side' ? 'flex' : 'none';
    document.getElementById('qa-fields-stack').style.display = unit==='stack' ? 'flex' : 'none';
  }
  const qaUnit = document.getElementById('qa-unit');
  if(qaUnit) qaUnit.onchange = (e)=> setQaFieldVisibility(e.target.value);

  document.querySelectorAll('[data-quickadd]').forEach(b=>{
    b.onclick = ()=>{
      const source = state.gym.find(g=>g.id===b.dataset.quickadd);
      if(!source) return;
      quickAddExercise = source.exercise;
      const unit = source.unit || 'kg';
      document.getElementById('qa-title').textContent = 'Quick add \u2014 ' + source.exercise;
      document.getElementById('qa-unit').value = unit;
      document.getElementById('qa-reps').value = source.reps;
      document.getElementById('qa-date').value = todayStr();
      document.getElementById('qa-session').value = source.session || '';
      document.getElementById('qa-muscle').value = source.muscleGroup || '';
      setQaFieldVisibility(unit);
      if(unit === 'kg') document.getElementById('qa-weight').value = source.weight;
      if(unit === 'kg_per_side'){
        document.getElementById('qa-weight-perside').value = source.weightPerSide;
        document.getElementById('qa-bar-weight').value = source.barWeight;
      }
      if(unit === 'stack') document.getElementById('qa-stack').value = source.weight;
      document.getElementById('qa-modal').style.display = 'flex';
    };
  });
  const qaCancel = document.getElementById('qa-cancel');
  if(qaCancel) qaCancel.onclick = ()=>{ document.getElementById('qa-modal').style.display = 'none'; };
  const qaConfirm = document.getElementById('qa-confirm');
  if(qaConfirm) qaConfirm.onclick = async ()=>{
    const unit = document.getElementById('qa-unit').value;
    const reps = parseInt(document.getElementById('qa-reps').value);
    const date = document.getElementById('qa-date').value || todayStr();
    const session = document.getElementById('qa-session').value;
    const muscleGroup = document.getElementById('qa-muscle').value;
    if(!quickAddExercise || !reps) return;
    let entry = {id:uid(), date, exercise:quickAddExercise, reps, unit, session, muscleGroup};
    if(unit === 'kg'){
      const w = parseFloat(document.getElementById('qa-weight').value);
      if(!w) return;
      entry.weight = w;
    }else if(unit === 'kg_per_side'){
      const wps = parseFloat(document.getElementById('qa-weight-perside').value);
      const bw = parseFloat(document.getElementById('qa-bar-weight').value) || 0;
      if(!wps) return;
      entry.weightPerSide = wps;
      entry.barWeight = bw;
    }else if(unit === 'stack'){
      const s = parseFloat(document.getElementById('qa-stack').value);
      if(!s) return;
      entry.weight = s;
    }
    state.gym.push(entry);
    await saveArr('gym:entries', state.gym);
    document.getElementById('qa-modal').style.display = 'none';
    render();
  };
  const gSearch = document.getElementById('g-search');
  if(gSearch) gSearch.oninput = (e)=>{
    gymSearch = e.target.value;
    render();
    const el = document.getElementById('g-search');
    if(el){ el.focus(); el.value = gymSearch; el.setSelectionRange(el.value.length, el.value.length); }
  };
  const gMuscleFilter = document.getElementById('g-muscle-filter');
  if(gMuscleFilter) gMuscleFilter.onchange = (e)=>{
    muscleFilter = e.target.value;
    render();
  };

  // ASSETS
  const aAdd = document.getElementById('a-add');
  if(aAdd) aAdd.onclick = async ()=>{
    const name = document.getElementById('a-name').value.trim();
    const type = document.getElementById('a-type').value;
    const tags = document.getElementById('a-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
    const link = document.getElementById('a-link').value.trim();
    const notes = document.getElementById('a-notes').value.trim();
    if(!name) return;
    state.assets.push({id:uid(), name, type, tags, link, notes});
    await saveArr('assets:list', state.assets);
    render();
  };
  const aSearch = document.getElementById('a-search');
  if(aSearch) aSearch.oninput = (e)=>{ assetSearch = e.target.value; render(); document.getElementById('a-search').focus(); document.getElementById('a-search').value=assetSearch; };
  const aFilter = document.getElementById('a-filter');
  if(aFilter) aFilter.onchange = (e)=>{ assetFilter = e.target.value; render(); };
  document.querySelectorAll('[data-del-asset]').forEach(b=>{
    b.onclick = async ()=>{
      state.assets = state.assets.filter(a=>a.id!==b.dataset.delAsset);
      await saveArr('assets:list', state.assets);
      render();
    };
  });

  // HABITS
  const hDate = document.getElementById('h-date');
  if(hDate) hDate.onchange = (e)=>{
    habitFormDate = e.target.value;
    render();
  };
  document.querySelectorAll('[data-habit]').forEach(chip=>{
    chip.onclick = ()=> chip.classList.toggle('on');
  });
  document.querySelectorAll('[data-remove-habit]').forEach(x=>{
    x.onclick = async (e)=>{
      e.stopPropagation();
      const name = x.dataset.removeHabit;
      state.habitNames = state.habitNames.filter(n=>n!==name);
      await saveArr('habits:names', state.habitNames);
      render();
    };
  });
  document.querySelectorAll('[data-mood]').forEach(btn=>{
    btn.onclick = ()=>{
      document.querySelectorAll('[data-mood]').forEach(b=>b.classList.remove('sel'));
      btn.classList.add('sel');
      btn.dataset.selected = 'true';
    };
  });
  const hAddHabit = document.getElementById('h-addhabit');
  if(hAddHabit) hAddHabit.onclick = async ()=>{
    const val = document.getElementById('h-newhabit').value.trim();
    if(!val || state.habitNames.includes(val)) return;
    state.habitNames.push(val);
    await saveArr('habits:names', state.habitNames);
    render();
  };
  const hSave = document.getElementById('h-save');
  if(hSave) hSave.onclick = async ()=>{
    const checked = Array.from(document.querySelectorAll('[data-habit].on')).map(c=>c.dataset.habit);
    const selMood = document.querySelector('[data-mood].sel');
    const mood = selMood ? parseInt(selMood.dataset.mood) : 0;
    const sleep = parseFloat(document.getElementById('h-sleep').value) || 0;
    const date = document.getElementById('h-date').value || todayStr();
    state.habitEntries = state.habitEntries.filter(e=>e.date!==date);
    state.habitEntries.push({id:uid(), date, checked, mood, sleep});
    await saveArr('habits:entries', state.habitEntries);
    render();
  };
  document.querySelectorAll('[data-del-habit]').forEach(b=>{
    b.onclick = async ()=>{
      state.habitEntries = state.habitEntries.filter(e=>e.id!==b.dataset.delHabit);
      await saveArr('habits:entries', state.habitEntries);
      render();
    };
  });

  // JOURNAL
  const jAdd = document.getElementById('j-add');
  if(jAdd) jAdd.onclick = async ()=>{
    const date = document.getElementById('j-date').value || todayStr();
    const text = document.getElementById('j-text').value.trim();
    if(!text) return;
    state.journal.push({id:uid(), date, text});
    await saveArr('journal:entries', state.journal);
    render();
  };
  document.querySelectorAll('[data-del-journal]').forEach(b=>{
    b.onclick = async ()=>{
      state.journal = state.journal.filter(j=>j.id!==b.dataset.delJournal);
      await saveArr('journal:entries', state.journal);
      render();
    };
  });

  // CALENDAR
  const calPrev = document.getElementById('cal-prev');
  if(calPrev) calPrev.onclick = ()=>{
    calMonth--;
    if(calMonth < 0){ calMonth = 11; calYear--; }
    render();
  };
  const calNext = document.getElementById('cal-next');
  if(calNext) calNext.onclick = ()=>{
    calMonth++;
    if(calMonth > 11){ calMonth = 0; calYear++; }
    render();
  };
  document.querySelectorAll('[data-cal-date]').forEach(cell=>{
    cell.onclick = ()=>{
      selectedCalDate = cell.dataset.calDate;
      render();
    };
  });

}

document.querySelectorAll('.navbtn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    currentView = btn.dataset.view;
    if(currentView!=='assets'){ assetFilter='all'; assetSearch=''; }
    render();
  });
});

// ---------- auth UI ----------
function showLoginScreen(){
  let overlay = document.getElementById('login-overlay');
  if(!overlay){
    overlay = document.createElement('div');
    overlay.id = 'login-overlay';
    overlay.style.cssText = "position:fixed; inset:0; background:#0A0A0A; display:flex; align-items:center; justify-content:center; z-index:999; font-family:'Inter',sans-serif;";
    overlay.innerHTML = `
      <div style="text-align:center;">
        <div style="font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:700; color:#F2F2F2; margin-bottom:6px;">Kurt // Systems</div>
        <div style="color:#8C8C8C; font-size:13px; margin-bottom:20px;">Sign in to sync your data across devices</div>
        <button id="google-signin-btn" style="background:#E63946; color:#fff; border:none; padding:11px 22px; border-radius:6px; font-weight:600; cursor:pointer; font-size:13px; display:block; width:100%; margin-bottom:10px;">Sign in with Google</button>
        <button id="guest-signin-btn" style="background:transparent; color:#8C8C8C; border:1px solid #333333; padding:10px 22px; border-radius:6px; font-weight:600; cursor:pointer; font-size:13px; display:block; width:100%;">Continue as Guest (testing only)</button>
        <div style="color:#8C8C8C; font-size:11px; margin-top:12px; max-width:280px;">Guest data isn't linked to an account &mdash; it won't follow you to another device or browser, and may be lost if you clear your browser data.</div>
      </div>`;
    document.body.appendChild(overlay);
    document.getElementById('google-signin-btn').onclick = ()=>{
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider).catch(err=>{ alert('Sign-in failed: '+err.message); });
    };
    document.getElementById('guest-signin-btn').onclick = ()=>{
      auth.signInAnonymously().catch(err=>{ alert('Guest sign-in failed: '+err.message+'. Anonymous sign-in may need to be enabled in Firebase console (Authentication > Sign-in method > Anonymous).'); });
    };
  }
  overlay.style.display = 'flex';
}
function hideLoginScreen(){
  const overlay = document.getElementById('login-overlay');
  if(overlay) overlay.style.display = 'none';
}
function renderUserBadge(){
  let badge = document.getElementById('user-badge');
  if(!badge){
    badge = document.createElement('div');
    badge.id = 'user-badge';
    badge.style.cssText = "margin-top:auto; padding:10px; border-top:1px solid var(--line); font-size:11px; color:var(--muted); display:flex; flex-direction:column; gap:6px;";
    document.getElementById('sidebar').appendChild(badge);
  }
  const label = currentUser.isAnonymous ? 'Guest session' : (currentUser.displayName || currentUser.email);
  badge.innerHTML = `<div style="color:var(--text); font-size:12px;">${label}</div><div style="cursor:pointer; color:var(--danger);" id="signout-btn">Sign out</div>`;
  document.getElementById('signout-btn').onclick = ()=> auth.signOut();
}

// ---------- init ----------
(async function init(){
  if(!cloudEnabled){
    await loadAll();
    render();
    return;
  }
  showLoginScreen();
  auth.onAuthStateChanged(async (user)=>{
    if(user){
      currentUser = user;
      try{
        const snap = await db.collection('users').doc(user.uid).get();
        remoteDoc = snap.exists ? snap.data() : {};
      }catch(e){ remoteDoc = {}; }
      hideLoginScreen();
      renderUserBadge();
      await loadAll();
      render();
    }else{
      currentUser = null;
      remoteDoc = null;
      showLoginScreen();
    }
  });
})();

})();
</script>
